<!-- CONTAINER DO DASHBOARD -->
<main class="dashboard-container">
    
    <!-- Cabeçalho da Página -->
    <div class="page-header">
        <div class="title-area">
            <h1>Painel do Monitor</h1>
            <p>Gerencie seu perfil, monitorias criadas e certificados.</p>
        </div>
    </div>

    <!-- GRID DO PERFIL (Divide em duas colunas no PC) -->
    <div class="perfil-grid">
        
        <!-- COLUNA ESQUERDA: Identidade (Foto e Dados) -->
        <section class="perfil-card identity-card" id="perfil_informacao">
            <div class="foto-area">
                <img src="IMG/Icone_perfil_grande.png" alt="Foto de perfil">
            </div>
            
            <h2 id="nomeUsuario">Carregando...</h2>
            
            <div class="badge-area">
                <span id="tipoUsuario" class="badge-tipo monitor-color">Monitor</span>
                <span class="badge-moedas">
                    <img src="IMG/Icone_moeda.png" alt="Moedas"> <strong>15</strong>
                </span>
            </div>

            <hr class="divisor">

            <div class="informacoes">
                <div class="info-item">
                    <div class="icone"><img src="IMG/Icone Email.png" alt="E-mail"></div>
                    <p id="emailUsuario">carregando@email.com</p>
                </div>
                <div class="info-item">
                    <div class="icone"><img src="IMG/Icone_matricula.png" alt="Matrícula"></div>
                    <p>Matrícula: <strong id="matriculaUsuario">000000</strong></p>
                </div>
                
                <!-- LINHA DE CERTIFICADOS (Exclusiva do Monitor) -->
                <div class="info-item linha-interativa">
                    <div class="icone"><img src="IMG/Icone_certificado.png" alt="Certificado"></div>
                    <p>Meus Certificados</p>
                    <button id="abrir_c" class="btn-pequeno">Ver</button>
                </div>
            </div>
        </section>

        <!-- COLUNA DIREITA: Listas e Ações -->
        <section class="perfil-card content-card">
            <div class="lista-container">
                <div class="lista-header">
                    <h2>Minhas Monitorias Criadas</h2>
                </div>
                
                <!-- AQUI O SEU JS INJETA AS MONITORIAS CRIADAS -->
                <div id="lista-monitorias-criadas" class="lista-itens">
                    <p class="loading-text">A carregar monitorias...</p>
                </div>
            </div>
        </section>

    </div>
</main>

<!-- SEU JS PROVAVELMENTE INJETA ISSO, SE NÃO INJETAR, ADICIONE AQUI NO HTML -->
<div id="area_certificados" class="modal-certificados">
    <!-- Conteúdo dos certificados gerado via JS -->
</div>
