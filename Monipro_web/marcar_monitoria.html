<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/marcar_monitoria.css">
    <link rel="icon" href="IMG/MoniPro-mini.png">
    <title>Marcar Monitoria - MoniPro</title>
</head>
<body>
    
    <header>
        <div class="logo">
            <a href="base.html">
                <img src="IMG/MoniPro_logo-menor.png" alt="Logo MoniPro" >
            </a>
        </div>
        
        <div class="header-actions">
            <div class="header-icon perfil-link" role="button" tabindex="0" aria-label="Ver perfil do usuário">
                <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#071E3D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </div>
            <div id="menu" class="header-icon" role="button" tabindex="0" aria-label="Abrir menu de navegação" aria-expanded="false" aria-controls="menuLateral">
                <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#071E3D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </div>
        </div>
    </header>

    <div id="overlay"></div>

    <nav id="menuLateral" aria-label="Menu principal">
        <div class="logo_fechar">
            <img src="IMG/Logo.png" alt="Logo MoniPro">
            <div id="menu_fechar" role="button" tabindex="0" aria-label="Fechar menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
        </div>
        <div class="item perfil-link" role="button" tabindex="0" aria-label="Ir para Perfil">
            <div class="icone"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
            <p>Perfil</p>
        </div>
        <div class="item monitoria-link" role="button" tabindex="0" aria-label="Ir para Monitoria">
            <div class="icone"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
            <p>Monitoria</p>
        </div>
        <div id="sair" class="item" role="button" tabindex="0" aria-label="Sair do sistema">
            <div class="icone"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
            <p>Sair</p>
        </div>
    </nav>

    <div id="aviso_sair">
        <div class="icone_sair">
            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <p>Tem certeza que quer sair?</p>
        </div>
        <div class="areaSim"><button id="btnSim">Sim</button></div>
        <div class="areaNao"><button id="btnNao">Não</button></div>
    </div>

    <main>
        <div class="titulo">
            <button class="btn-voltar" onclick="history.back()" aria-label="Voltar para a lista de disciplinas">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
                Voltar
            </button>
            <h1 id="titulo-pagina">Escolha a data para a monitoria</h1>
        </div>
        
        <div class="areaCalendario">
            <p>Dias disponíveis</p> 
            <div class="calendario">
                <div class="calendario-header">
                    <button id="mes-anterior" class="btn-mes" aria-label="Mês anterior">&#10094;</button>
                    <span id="mes-ano">Carregando...</span>
                    <button id="proximo-mes" class="btn-mes" aria-label="Próximo mês">&#10095;</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Dom</th><th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th><th>Sex</th><th>Sáb</th>
                        </tr>
                    </thead>
                    <tbody id="dias-calendario">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="areaMarcar" id="view-aluno">
            <p>Monitores Disponíveis</p>
            <div class="monitores" id="lista-monitores">
                <p>A carregar monitores...</p>
            </div>
            <div id="marcar-agendamento" class="btn-acao" role="button" tabindex="0" aria-label="Agendar Monitoria">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <p>Agendar Monitoria</p>
            </div>
        </div>

        <div class="areaMarcar" id="view-monitor" style="display: none;">
            <p>Criar Vaga de Monitoria</p>
            <div class="form-monitor">
                <label for="monitoria-horario">Horário (ex: 14:00):</label>
                <input type="time" id="monitoria-horario" required>
                
                <label for="monitoria-local">Local (ex: Lab 3):</label>
                <input type="text" id="monitoria-local" placeholder="Laboratório 3, Bloco C" required>

                <label for="monitoria-descricao">Descrição (Opcional):</label>
                <textarea id="monitoria-descricao" placeholder="Ex: Foco em SQL Joins"></textarea>
            </div>
            <div id="criar-monitoria" class="btn-acao" role="button" tabindex="0" aria-label="Criar Vaga de Monitoria">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <p>Criar Vaga</p>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    
    <script src="JS/toast.js" defer></script>
    <script src="JS/api.js" defer></script>
    <script src="JS/base.js" defer></script> 
    <script src="JS/calendario.js" defer></script>
    <script src="JS/marcar_monitoria.js" defer></script>
    
</body>

</html>
