<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/marcar_monitoria.css">
    <link rel="icon" href="IMG/MoniPro-mini.png">
    <!-- CORREÇÃO: título mais claro -->
    <title>Monitorias - MoniPro</title>
</head>
<body>

<header>
    <div class="logo">
        <a href="base.html"><img src="IMG/MoniPro_logo-menor.png" alt="Logo MoniPro"></a>
    </div>
    <div class="header-actions">
        <div class="header-icon perfil-link"><img src="IMG/Icone_Perfil.png" alt="Perfil"></div>
        <div id="menu" class="header-icon"><img src="IMG/Menu_hamburguer.png" alt="Menu"></div>
    </div>
</header>

<!-- CORREÇÃO: overlay e menuLateral estavam ausentes — base.js depende deles -->
<div id="overlay"></div>

<nav id="menuLateral">
    <div class="logo_fechar">
        <img src="IMG/Logo.png" alt="Logo MoniPro">
        <div id="menu_fechar"><img src="IMG/Icone_menu_fechar.png" alt="Fechar menu"></div>
    </div>
    <div class="item perfil-link">
        <div class="icone"><img src="IMG/Icone_perfil_menu.png" alt="Perfil"></div>
        <p>Perfil</p>
    </div>
    <div class="item monitoria-link">
        <div class="icone"><img src="IMG/logo_monitoria.png" alt="Monitoria"></div>
        <p>Monitoria</p>
    </div>
    <div id="sair" class="item">
        <div class="icone"><img src="IMG/Icone_sair.png" alt="Sair"></div>
        <p>Sair</p>
    </div>
</nav>

<!-- Modal logout -->
<div id="aviso_sair">
    <div class="icone_sair">
        <img src="IMG/Icone_aviso.png" alt="Ícone de aviso">
        <p>Tem certeza que quer sair?</p>
    </div>
    <div class="areaSim"><button id="btnSim">Sim</button></div>
    <div class="areaNao"><button id="btnNao">Não</button></div>
</div>

<main>
    <div class="titulo">
        <!-- CORREÇÃO: era "MonitoriaService" (nome de classe vazado) → preenchido pelo JS -->
        <h1 id="titulo-pagina">Monitoria</h1>
    </div>

    <div class="areaCalendario">
        <div class="calendario">
            <div class="header">
                <button id="mes-anterior" aria-label="Mês anterior">&lt;</button>
                <h2 id="mes-ano">Mês Ano</h2>
                <button id="proximo-mes" aria-label="Próximo mês">&gt;</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Dom</th><th>Seg</th><th>Ter</th>
                        <th>Qua</th><th>Qui</th><th>Sex</th><th>Sáb</th>
                    </tr>
                </thead>
                <tbody id="dias-calendario"></tbody>
            </table>
        </div>
    </div>

    <!-- VIEW DO ALUNO -->
    <div class="areaMarcar" id="view-aluno">
        <!-- CORREÇÃO: era "Agendar MonitoriaService" → texto correto -->
        <p>Monitores Disponíveis</p>
        <div class="monitores" id="lista-monitores">
            <p>Selecione um dia no calendário.</p>
        </div>
        <div id="marcar-agendamento" class="btn-acao">
            <img src="IMG/_.png" alt="">
            <p>Agendar Monitoria</p>
        </div>
    </div>

    <!-- VIEW DO MONITOR -->
    <div class="areaMarcar" id="view-monitor" style="display: none;">
        <!-- CORREÇÃO: era "Criar Vaga de MonitoriaService" → texto correto -->
        <p>Criar Vaga de Monitoria</p>
        <div class="form-monitor">
            <label for="monitoria-horario">Horário:</label>
            <input type="time" id="monitoria-horario" required>

            <label for="monitoria-local">Local:</label>
            <input type="text" id="monitoria-local" placeholder="Ex: Laboratório 3, Bloco C" required>

            <label for="monitoria-descricao">Descrição (Opcional):</label>
            <textarea id="monitoria-descricao" placeholder="Ex: Foco em exercícios de SQL Joins"></textarea>
        </div>
        <div id="criar-monitoria" class="btn-acao">
            <img src="IMG/_.png" alt="">
            <p>Criar Vaga</p>
        </div>
    </div>
</main>

<div id="toast-container"></div>
<script src="JS/toast.js"></script>
<script src="JS/api.js"></script>
<script src="JS/base.js"></script>
<!-- calendario.js deve vir ANTES de marcar_monitoria.js pois expõe renderCalendario(), selecionarDia(), etc. -->
<script src="JS/calendario.js"></script>
<script src="JS/marcar_monitoria.js"></script>
</body>
</html>
