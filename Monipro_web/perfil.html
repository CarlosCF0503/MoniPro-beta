<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/perfil.css">
    <link rel="icon" href="IMG/MoniPro-mini.png">
    <title>Perfil - MoniPro</title>
</head>
<body>

<header>
    <div class="logo">
        <a href="base.html"><img src="IMG/MoniPro_logo-menor.png" alt="Logo MoniPro"></a>
    </div>
    <div class="header-actions">
        <!-- CORREÇÃO: era id="perfil" — base.js busca .perfil-link (classe), não #perfil (id) -->
        <div class="header-icon perfil-link">
            <img src="IMG/Icone_Perfil.png" alt="Ver perfil">
        </div>
        <div id="menu" class="header-icon">
            <img src="IMG/Menu_hamburguer.png" alt="Menu">
        </div>
    </div>
</header>

<div id="overlay"></div>

<nav id="menuLateral">
    <div class="logo_fechar">
        <img src="IMG/Logo.png" alt="Logo MoniPro">
        <div id="menu_fechar"><img src="IMG/Icone_menu_fechar.png" alt="Fechar"></div>
    </div>
    <div class="item perfil-link">
        <div class="icone"><img src="IMG/Icone_perfil_menu.png" alt="Perfil"></div>
        <p>Perfil</p>
    </div>
    <div class="item monitoria-link">
        <div class="icone"><img src="IMG/logo_monitoria.png" alt="Monitoria"></div>
        <p>Monitoria</p>
    </div>
    <div id="sair" class="item">
        <div class="icone"><img src="IMG/Icone_sair.png" alt="Sair"></div>
        <p>Sair</p>
    </div>
</nav>

<!-- Modal logout -->
<div id="aviso_sair">
    <div class="icone_sair">
        <img src="IMG/Icone_aviso.png" alt="Ícone de aviso">
        <p>Tem certeza que quer sair?</p>
    </div>
    <div class="areaSim"><button id="btnSim">Sim</button></div>
    <div class="areaNao"><button id="btnNao">Não</button></div>
</div>

<!-- Modal confirmação de ações (cancelar inscrição / cancelar vaga) -->
<div id="modal-confirmacao" class="modal-aviso">
    <div class="icone_sair">
        <img src="IMG/Icone_aviso.png" alt="Ícone de aviso">
        <p id="modal-confirmacao-texto">Tem certeza?</p>
    </div>
    <div class="areaSim"><button id="btnConfirmarSim" class="btn-confirmar-acao">Sim</button></div>
    <div class="areaNao"><button id="btnConfirmarNao" class="btn-cancelar-acao">Não</button></div>
</div>

<!-- Cartão principal do perfil -->
<div class="perfil_informacao" id="perfil_informacao">
    <img src="IMG/Icone_perfil_grande.png" alt="Foto de perfil">
    <h1 id="nomeUsuario">Carregando...</h1>
    <p>
        <span id="tipoUsuario">Usuário</span>
        &nbsp;—&nbsp;
        <img src="IMG/Icone_moeda.png" alt="Moedas"><strong>15</strong>
    </p>

    <div class="linha"></div>

    <div class="informacoes">
        <span>
            <div class="icone"><img src="IMG/Icone Email.png" alt="E-mail"></div>
            <p id="emailUsuario">carregando...</p>
        </span>
        <span>
            <div class="icone"><img src="IMG/Icone_matricula.png" alt="Matrícula"></div>
            <p>Matrícula: <strong id="matriculaUsuario">0000</strong></p>
        </span>
        <!-- Botão de certificados: visível apenas para monitores (controlado pelo perfil.js) -->
        <span class="linha-interativa" id="btn-certificados" style="display: none;">
            <div class="icone"><img src="IMG/Icone_certificado.png" alt="Certificados"></div>
            <p>Certificados</p>
            <div id="abrir_c"><p>ver</p></div>
        </span>
    </div>

    <div class="linha"></div>

    <!-- Área do aluno: lista de monitorias em que está inscrito -->
    <div class="lista-container" id="area-aluno" style="display: none;">
        <h2>Minhas Monitorias Inscritas</h2>
        <div id="lista-agendamentos" class="lista-itens"><p>A carregar...</p></div>
    </div>

    <!-- Área do monitor: lista de vagas criadas -->
    <div class="lista-container" id="area-monitor" style="display: none;">
        <h2>Minhas Monitorias Criadas</h2>
        <div id="lista-monitorias-criadas" class="lista-itens"><p>A carregar...</p></div>
    </div>
</div>

<!-- Painel de certificados (desliza para o lado) -->
<div id="area_certificados">
    <div class="titulo">
        <img src="IMG/Icone_certificado.png" alt="" style="height: 35px; margin-right: 10px;">
        <h2>Meus Certificados</h2>
    </div>
    <div id="certificado">
        <div class="icone"><img src="IMG/Icone_certificado.png" alt="Certificado"></div>
        <span>
            <strong>Certificado de Monitoria</strong>
            <p>Semestre 2025.2</p>
        </span>
        <a href="#"><img src="IMG/icone_download.png" alt="Baixar"></a>
    </div>
</div>

<div id="toast-container"></div>
<script src="JS/toast.js" defer></script>
<script src="JS/api.js" defer></script>
<script src="JS/base.js" defer></script>
<script src="JS/perfil.js" defer></script>
</body>
</html>
