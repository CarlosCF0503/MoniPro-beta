<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="icon" href="IMG/MoniPro-mini.png">
    
    <!-- CSS Exclusivo do Aluno -->
    <link rel="stylesheet" href="CSS/perfil_aluno.css">
    
    <title>Perfil - Aluno - MoniPro</title>
</head>
<body>
    
    <!-- HEADER E NAV INTACTOS -->
    <header>
        <div class="logo">
            <a href="base.html"><img src="IMG/MoniPro_logo-menor.png" alt="Logo MoniPro"></a>
        </div>
        <div class="header-actions">
            <div class="perfil-link header-icon"><img src="IMG/Icone_Perfil.png" alt="Ver perfil"></div>
            <div id="menu" class="header-icon"><img src="IMG/Menu_hamburguer.png" alt="Abrir menu"></div>
        </div>
    </header>

    <div id="overlay"></div>

    <nav id="menuLateral">
        <div class="logo_fechar">
            <img src="IMG/Logo.png" alt="Logo completo MoniPro">
            <div id="menu_fechar"><img src="IMG/Icone_menu_fechar.png" alt="Fechar menu"></div>   
        </div>
        <div class="perfil-link item">
            <div class="icone"><img src="IMG/Icone_perfil_menu.png" alt=""></div>
            <p>Perfil</p>
        </div>
        <div class="item monitoria-link">
            <div class="icone"><img src="IMG/logo_monitoria.png" alt="Ícone de perfil"></div>
            <p>Monitoria</p>
        </div>
        <div id="sair" class="item">
            <div class="icone"><img src="IMG/Icone_sair.png" alt="Ícone de porta"></div>
            <p>Sair</p>
        </div>
    </nav>

    <!-- MODAIS DE AVISO INTACTOS -->
    <div id="aviso_sair">
        <div class="icone_sair">
            <img src="IMG/Icone_aviso.png" alt="Ícone de aviso">
            <p>Tem certeza que quer sair?</p>
        </div>
        <div class="areaSim"><button id="btnSim">Sim</button></div>
        <div class="areaNao"><button id="btnNao">Não</button></div>
    </div>

    <div id="modal-confirmacao" class="modal-aviso">
        <div class="icone_sair">
            <img src="IMG/Icone_aviso.png" alt="Ícone de aviso">
            <p id="modal-confirmacao-texto">Tem certeza?</p>
        </div>
        <div class="areaSim"><button id="btnConfirmarSim" class="btn-confirmar-acao">Sim</button></div>
        <div class="areaNao"><button id="btnConfirmarNao" class="btn-cancelar-acao">Não</button></div>
    </div>

    <!-- ==========================================
         NOVO DASHBOARD DO ALUNO 
         ========================================== -->
    <main class="dashboard-wrapper">
        <div class="dashboard-container">
            
            <div class="page-header">
                <div class="title-area">
                    <h1>Meu Perfil</h1>
                    <p>Gerencie suas informações e monitorias inscritas.</p>
                </div>
            </div>

            <div class="perfil-grid">
                <!-- IDENTIDADE DO ALUNO -->
                <section class="perfil-card identity-card" id="perfil_informacao">
                    <div class="foto-area">
                        <img src="IMG/Icone_perfil_grande.png" alt="Foto de perfil">
                    </div>
                    
                    <h2 id="nomeUsuario">Carregando...</h2>
                    
                    <div class="badge-area">
                        <span id="tipoUsuario" class="badge-tipo">Aluno</span>
                        <span class="badge-moedas">
                            <img src="IMG/Icone_moeda.png" alt="Moedas"> <strong>15</strong>
                        </span>
                    </div>

                    <hr class="divisor">

                    <div class="informacoes">
                        <div class="info-item">
                            <div class="icone"><img src="IMG/Icone Email.png" alt="E-mail"></div>
                            <p id="emailUsuario">carregando@email.com</p>
                        </div>
                        <div class="info-item">
                            <div class="icone"><img src="IMG/Icone_matricula.png" alt="Matrícula"></div>
                            <p>Matrícula: <strong id="matriculaUsuario">000000</strong></p>
                        </div>
                    </div>
                </section>

                <!-- LISTA DE MONITORIAS DO ALUNO -->
                <section class="perfil-card content-card">
                    <div class="lista-container">
                        <div class="lista-header">
                            <h2>Minhas Monitorias Inscritas</h2>
                        </div>
                        <div id="lista-agendamentos" class="lista-itens">
                            <p class="loading-text">A carregar monitorias...</p>
                        </div>
                    </div>
                </section>

            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="JS/api.js" defer></script>
    <script src="JS/toast.js" defer></script>
    <script src="JS/base.js" defer></script> 
    <script src="JS/perfil.js" defer></script>
</body>
</html>
