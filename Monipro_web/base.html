<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="icon" href="IMG/MoniPro-mini.png">
    <title>Base - MoniPro</title>
</head>
<body>
    
    <header>
        <div class="logo">
            <a href="base.html">
                <img src="IMG/MoniPro_logo-menor.png" alt="Logo MoniPro" >
            </a>
        </div>
        

        <div class="header-actions">
            <div class="header-icon perfil-link" role="button" tabindex="0" aria-label="Ver perfil do usuário">
                <img src="IMG/Icone_Perfil.png" alt="">
            </div>

            <div id="menu" class="header-icon" role="button" tabindex="0" aria-label="Abrir menu de navegação" aria-expanded="false" aria-controls="menuLateral">
                <img src="IMG/Menu_hamburguer.png" alt="">
            </div>
        </div>
    </header>

    <div id="overlay"></div>

    <nav id="menuLateral" aria-label="Menu principal">
        <div class="logo_fechar">
            <img src="IMG/Logo.png" alt="Logo MoniPro">
            <div id="menu_fechar" role="button" tabindex="0" aria-label="Fechar menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
        </div>

        <div class="item perfil-link" role="button" tabindex="0" aria-label="Ir para Perfil">
            <div class="icone">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
            </div>
            <p>Perfil</p>
        </div>

        <div class="item monitoria-link" role="button" tabindex="0" aria-label="Ir para Monitoria">
            <div class="icone">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
            </div>
            <p>Monitoria</p>
        </div>

        <div id="sair" class="item" role="button" tabindex="0" aria-label="Sair do sistema">
            <div class="icone">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </div>
            <p>Sair</p>
        </div>
    </nav>

    <div id="aviso_sair">
        <div class="icone_sair">
            <img src="IMG/Icone_aviso.png" alt="Ícone de aviso">
            <p>Tem certeza que quer sair?</p>
        </div>
        <div class="areaSim">
            <button id="btnSim">Sim</button>
        </div>
        <div class="areaNao">
            <button id="btnNao">Não</button>
        </div>
    </div>

    <div id="modal-confirmacao" class="modal-aviso">
        <div class="icone_sair">
            <img src="IMG/Icone_aviso.png" alt="Ícone de aviso">
            <p id="modal-confirmacao-texto">Tem certeza?</p>
        </div>
        <div class="areaSim">
            <button id="btnConfirmarSim" class="btn-confirmar-acao">Sim</button>
        </div>
        <div class="areaNao">
            <button id="btnConfirmarNao" class="btn-cancelar-acao">Não</button>
        </div>
    </div>



    <main>
    </main>

    <div id="toast-container"></div>
    <script src="JS/toast.js" defer></script>
    
    <script src="JS/base.js" defer></script> 
</body>
</html>
