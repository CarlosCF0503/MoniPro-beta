<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="IMG/MoniPro-mini.png">
    
    <!-- Apenas o CSS da escolha de cadastro (sem o login.css antigo) -->
    <link rel="stylesheet" href="CSS/escolha_cadastro.css">
    
    <title>Escolha de Perfil - MoniPro</title>
</head>
<body>

<!-- CONTAINER PRINCIPAL: Divide a tela -->
<main class="split-layout">

    <!-- LADO ESQUERDO: Fundo branco, com as opções -->
    <section class="form-side">
        <div class="form-container text-center">
            
            <img src="IMG/MoniPro-Logo.png" alt="Logo da MoniPro" class="logo">
            
            <div class="header-text">
                <h1 class="text1">Qual é o seu perfil?</h1>
                <p>Selecione como você deseja utilizar o sistema.</p>
            </div>

            <!-- BOTÕES DE ESCOLHA -->
            <div class="opcoes">
                <a href="cadastro.html?tipo=aluno" class="opcao">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                    <span>Aluno</span>
                </a>
                <a href="cadastro.html?tipo=monitor" class="opcao">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <!-- Páginas do livro -->
                        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
                        <!-- Linhas página esquerda -->
                        <line x1="4"  y1="9"  x2="9"  y2="9"  stroke-width="1.1" stroke-opacity="0.6"/>
                        <line x1="4"  y1="12" x2="9"  y2="12" stroke-width="1.1" stroke-opacity="0.6"/>
                        <line x1="4"  y1="15" x2="7"  y2="15" stroke-width="1.1" stroke-opacity="0.6"/>
                        <!-- Linhas página direita -->
                        <line x1="15" y1="9"  x2="20" y2="9"  stroke-width="1.1" stroke-opacity="0.6"/>
                        <line x1="15" y1="12" x2="20" y2="12" stroke-width="1.1" stroke-opacity="0.6"/>
                        <line x1="15" y1="15" x2="18" y2="15" stroke-width="1.1" stroke-opacity="0.6"/>
                    </svg>
                    <span>Monitor</span>
                </a>
            </div>

            <!-- LINK DE VOLTAR -->
            <div class="link-voltar">
                <a href="index.html">← Voltar para o Login</a>
            </div>

        </div>
    </section>

    <!-- LADO DIREITO: Identidade Visual -->
    <section class="visual-side">
        <div class="visual-content">
            <h2>Comece sua jornada acadêmica com a gente.</h2>
        </div>
    </section>

</main>

</body>
</html>
