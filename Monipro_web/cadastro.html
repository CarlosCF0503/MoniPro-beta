<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="IMG/MoniPro-mini.png">
    <link rel="stylesheet" href="CSS/login.css">
    <link rel="stylesheet" href="CSS/cadastro.css">
    <title>Cadastro - MoniPro</title>
</head>
<body>
<img src="IMG/MoniPro-Logo.png" alt="Logo da MoniPro" class="logo">
<form id="formCadastro">
    <h1 class="text1">Cadastro</h1>

    <div class="input-group">
        <div class="icone"><img src="IMG/Icone_nome.png" alt="Ícone de nome"></div>
        <label for="inputNome" class="sr-only">Nome Completo</label>
        <input type="text" id="inputNome" placeholder="Nome Completo" required>
    </div>

    <div class="input-group">
        <div class="icone"><img src="IMG/Icone Email.png" alt="Ícone de e-mail"></div>
        <label for="inputEmail" class="sr-only">Endereço de E-mail</label>
        <input type="email" id="inputEmail" placeholder="Endereço de E-mail" required>
    </div>

    <div class="input-group">
        <div class="icone"><img src="IMG/Icone_nome.png" alt="Ícone de matrícula"></div>
        <label for="inputMatricula" class="sr-only">Matrícula</label>
        <input type="number" id="inputMatricula" placeholder="Número de Matrícula" required>
    </div>

    <div class="input-group input-group-senha">
        <div class="icone"><img src="IMG/Icone Cadeado.png" alt="Ícone de cadeado"></div>
        <label for="inputSenha" class="sr-only">Senha</label>
        <input type="password" id="inputSenha" placeholder="Senha" required>
        <button type="button" class="olho" aria-label="Mostrar senha" data-target="inputSenha">
            <svg class="olho-svg olho-fechado" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            <svg class="olho-svg olho-aberto" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </div>

    <div class="input-group input-group-senha">
        <div class="icone"><img src="IMG/Icone Cadeado.png" alt="Ícone de cadeado"></div>
        <label for="inputConfirmarSenha" class="sr-only">Confirmar Senha</label>
        <input type="password" id="inputConfirmarSenha" placeholder="Confirmar Senha" required>
        <button type="button" class="olho" aria-label="Mostrar senha" data-target="inputConfirmarSenha">
            <svg class="olho-svg olho-fechado" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            <svg class="olho-svg olho-aberto" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
    </div>

    <p id="erro"></p>
    <input type="submit" id="entrar" value="Cadastrar">

    <div class="link-voltar">
        <p>Já tem uma conta?</p>
        <a href="index.html">Voltar</a>
    </div>
</form>

<div id="toast-container"></div>
<script src="JS/toast.js"></script>
<script src="JS/api.js"></script>
<script src="JS/cadastro.js"></script>
</body>
</html>
