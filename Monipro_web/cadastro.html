<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="IMG/MoniPro-mini.png">
    
    <!-- Agora você pode usar apenas um CSS para estruturar a tela toda -->
    <link rel="stylesheet" href="CSS/cadastro.css">
    
    <title>Cadastro - MoniPro</title>
</head>
<body>

<!-- CONTAINER PRINCIPAL: Divide a tela -->
<main class="split-layout">

    <!-- LADO ESQUERDO: Fundo branco, com o seu formulário -->
    <section class="form-side">
        <div class="form-container">
            
            <!-- Logo movida para dentro da área clara -->
            <img src="IMG/MoniPro-Logo.png" alt="Logo da MoniPro" class="logo">

            <form id="formCadastro">
                <div class="header-text">
                    <h1 class="text1">Criar Conta</h1>
                    <p>Preencha os dados abaixo para se cadastrar.</p>
                </div>

                <!-- INPUTS -->
                <div class="input-group">
                    <div class="icone">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                    </div>
                    <label for="inputNome" class="sr-only">Nome Completo</label>
                    <input type="text" id="inputNome" placeholder="Nome Completo" required>
                </div>

                <div class="input-group">
                    <div class="icone">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    </div>
                    <label for="inputEmail" class="sr-only">Endereço de E-mail</label>
                    <input type="email" id="inputEmail" placeholder="Endereço de E-mail" required>
                </div>

                <div class="input-group">
                    <div class="icone">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="9" cy="12" r="2.5"/><path d="M14 10h4M14 14h4"/></svg>
                    </div>
                    <label for="inputMatricula" class="sr-only">Matrícula</label>
                    <input type="number" id="inputMatricula" placeholder="Número de Matrícula" required>
                </div>

                <div class="input-group input-group-senha">
                    <div class="icone">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <label for="inputSenha" class="sr-only">Senha</label>
                    <input type="password" id="inputSenha" placeholder="Senha" required>
                    <button type="button" class="olho" aria-label="Mostrar senha" data-target="inputSenha">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>

                <div class="input-group input-group-senha">
                    <div class="icone">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    </div>
                    <label for="inputConfirmarSenha" class="sr-only">Confirmar Senha</label>
                    <input type="password" id="inputConfirmarSenha" placeholder="Confirmar Senha" required>
                    <button type="button" class="olho" aria-label="Mostrar senha" data-target="inputConfirmarSenha">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>

                <p id="erro"></p>
                <input type="submit" id="entrar" value="Cadastrar">

                <div class="link-voltar">
                    <p>Já tem uma conta?</p>
                    <a href="index.html">Faça login</a>
                </div>
            </form>
        </div>
    </section>

    <!-- LADO DIREITO: Fundo institucional com a identidade do app -->
    <section class="visual-side">
        <div class="visual-content">
            <h2>Gestão de monitorias rápida e simples.</h2>
        </div>
    </section>

</main>

<!-- SEUS SCRIPTS ORIGINAIS -->
<div id="toast-container"></div>
<script src="JS/toast.js"></script>
<script src="JS/api.js"></script>
<script src="JS/cadastro.js"></script>
</body>
</html>
