<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/base.css">
    <link rel="stylesheet" href="CSS/escolha_disciplina.css">
    <link rel="icon" href="IMG/MoniPro-mini.png">
    <title>Disciplinas - MoniPro</title>
</head>
<body>

<!-- SEU HEADER E NAV ORIGINAIS (Intactos) -->
<header>
    <div class="logo">
        <a href="base.html"><img src="IMG/MoniPro_logo-menor.png" alt="Logo MoniPro"></a>
    </div>
    <div class="header-actions">
        <div class="header-icon perfil-link" role="button" tabindex="0" aria-label="Ver perfil do usuário"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#071E3D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
        <div id="menu" class="header-icon" role="button" tabindex="0" aria-label="Abrir menu de navegação" aria-expanded="false" aria-controls="menuLateral"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#071E3D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></div>
    </div>
</header>

<div id="overlay"></div>

<nav id="menuLateral" aria-label="Menu principal">
    <div class="logo_fechar">
        <img src="IMG/Logo.png" alt="Logo MoniPro">
        <div id="menu_fechar" role="button" tabindex="0" aria-label="Fechar menu"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>
    </div>
    <div class="item perfil-link" role="button" tabindex="0" aria-label="Ir para Perfil">
        <div class="icone"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
        <p>Perfil</p>
    </div>
    <div class="item monitoria-link" role="button" tabindex="0" aria-label="Ir para Monitoria">
        <div class="icone"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></div>
        <p>Monitoria</p>
    </div>
    <div id="sair" class="item" role="button" tabindex="0" aria-label="Sair do sistema">
        <div class="icone"><svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
        <p>Sair</p>
    </div>
</nav>

<div id="aviso_sair">
    <div class="icone_sair">
        <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <p>Tem certeza que quer sair?</p>
    </div>
    <div class="areaSim"><button id="btnSim">Sim</button></div>
    <div class="areaNao"><button id="btnNao">Não</button></div>
</div>

<!-- ==========================================
     NOVO DASHBOARD 
     ========================================== -->
<main class="dashboard-wrapper">
    <div class="dashboard-container">
        
        <!-- Cabeçalho -->
        <div class="page-header">
            <div class="title-area">
                <a href="base.html" class="btn-voltar" aria-label="Voltar ao painel principal">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
                    Voltar
                </a>
                <h1>Minhas Disciplinas</h1>
                <p>Selecione uma disciplina para gerenciar a monitoria.</p>
            </div>

            <!-- Busca -->
            <div class="search-area">
                <div class="search-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" placeholder="Buscar disciplina...">
                </div>
            </div>
        </div>

        <!-- CLASSE CORRIGIDA: O seu JS precisa dessa div exatamente com o class="disciplinas" -->
        <div class="disciplinas">
            <p class="loading-text">A carregar disciplinas...</p>
        </div>

    </div>
</main>

<div id="toast-container"></div>
<script src="JS/toast.js"></script>
<script src="JS/api.js"></script>
<script src="JS/base.js"></script>
<script src="JS/escolha_disciplina.js"></script>
</body>
</html>
